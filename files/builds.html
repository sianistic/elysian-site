<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builds — Elysian PCs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .builds-hero {
      padding: 140px 0 80px;
      text-align: center;
      position: relative;
    }
    .builds-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, var(--gold-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3rem;
    }
    .builds-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) auto;
      gap: 1rem;
      margin-bottom: 1.25rem;
      align-items: center;
    }
    .builds-search {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
    }
    .builds-search input,
    .builds-sort {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-primary);
      outline: none;
      font: inherit;
    }
    .builds-sort-wrap {
      padding: 0.85rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      min-width: 220px;
    }
    .filter-chip {
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-chip:hover,
    .filter-chip.active {
      border-color: var(--border-gold);
      color: var(--gold-pure);
      background: var(--gold-glow);
    }

    /* ── Builds Grid ── */
    #builds-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.75rem;
    }

    /* ── Image Gallery ── */
    .pc-gallery {
      position: relative;
      width: 100%;
      height: 240px;
      overflow: hidden;
      background: #0d0d14;
      flex-shrink: 0;
    }

    .gallery-track {
      display: flex;
      height: 100%;
      transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1);
      will-change: transform;
    }

    .gallery-slide {
      min-width: 100%;
      height: 100%;
      flex-shrink: 0;
    }

    .gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .pc-card:hover .gallery-slide img {
      transform: scale(1.04);
    }

    .gallery-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Arrow Buttons ── */
    .gallery-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(10, 10, 12, 0.75);
      border: 1px solid var(--border-gold);
      color: var(--gold-pure);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s ease, background 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(6px);
    }
    .gallery-arrow:hover {
      background: rgba(212, 168, 67, 0.2);
    }
    .gallery-arrow.prev { left: 0.6rem; }
    .gallery-arrow.next { right: 0.6rem; }

    /* Show arrows only when hovering the card */
    .pc-card:hover .gallery-arrow { opacity: 1; }

    /* ── Dot Indicators ── */
    .gallery-dots {
      position: absolute;
      bottom: 0.6rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      z-index: 10;
    }
    .gallery-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      padding: 0;
    }
    .gallery-dot.active {
      background: var(--gold-pure);
      width: 16px;
      border-radius: 3px;
    }

    /* ── Image Counter ── */
    .gallery-counter {
      position: absolute;
      bottom: 0.6rem;
      right: 0.7rem;
      background: rgba(10,10,12,0.7);
      border: 1px solid var(--border-gold);
      color: var(--gold-pure);
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.5rem;
      border-radius: 100px;
      backdrop-filter: blur(6px);
    }

    /* ── Spec Table (modal) ── */
    .spec-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    .spec-table tr { border-bottom: 1px solid var(--border-subtle); }
    .spec-table tr:last-child { border-bottom: none; }
    .spec-table td { padding: 0.6rem 0.5rem; font-size: 0.85rem; }
    .spec-table td:first-child {
      color: var(--text-muted);
      width: 40%;
      font-family: var(--font-display);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .spec-table td:last-child { color: var(--text-primary); }

    /* ── Modal Gallery (arrows always visible) ── */
    .modal-gallery-wrap .gallery-arrow { opacity: 1; }
    .modal-gallery-wrap .gallery-arrow:hover {
      background: rgba(212,168,67,0.25);
      transform: translateY(-50%) scale(1.1);
    }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: skeleton 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes skeleton {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-img { height: 240px; border-radius: var(--radius-md) var(--radius-md) 0 0; }
    .skel-text { height: 1rem; margin: 0.5rem 0; }
    .skel-text.sm { width: 60%; }
    .skel-text.lg { width: 80%; }
    .skel-btn  { height: 44px; border-radius: var(--radius-sm); margin-top: 1rem; }


    /* ── Bookmark Toggle (shadcn-inspired) ── */
    .bookmark-btn {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      z-index: 20;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-glass);
      backdrop-filter: blur(8px);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      opacity: 0;
    }
    .pc-card:hover .bookmark-btn { opacity: 1; }
    .bookmark-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: rgba(99, 102, 241, 0.4);
      color: #6366f1;
    }
    .bookmark-btn.bookmarked {
      opacity: 1;
      background: rgba(99, 102, 241, 0.12);
      border-color: rgba(99, 102, 241, 0.5);
      color: #6366f1;
    }
    .bookmark-btn.bookmarked svg { fill: #6366f1; }

    /* ── Tooltip ── */
    .bookmark-wrap {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      z-index: 20;
    }
    .tooltip-box {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.72rem;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      white-space: nowrap;
      box-shadow: var(--shadow-card);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .bookmark-btn:hover + .tooltip-box,
    .bookmark-btn:focus + .tooltip-box {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Saved chip indicator dot ── */
    .filter-chip .chip-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6366f1;
      margin-left: 5px;
      vertical-align: middle;
    }
    .builds-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1.5rem;
      border: 1px dashed var(--border-gold);
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(212,168,67,0.08), rgba(255,255,255,0.01));
    }
    .builds-empty p { color: var(--text-secondary); max-width: 520px; margin: 0.6rem auto 0; }

    .pc-card {
      position: relative;
      overflow: hidden;
      border-radius: 1.6rem;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05)),
        var(--bg-glass);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow:
        0 24px 70px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    [data-theme="light"] .pc-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.7)),
        rgba(255,255,255,0.74);
      border-color: rgba(122, 90, 18, 0.16);
      box-shadow:
        0 18px 52px rgba(148, 116, 38, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .pc-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 35%, rgba(212,168,67,0.08) 100%);
      pointer-events: none;
    }
    .pc-card .card-body {
      position: relative;
      z-index: 2;
      padding: 1.35rem;
      display: flex;
      flex-direction: column;
      gap: 0.95rem;
    }
    .pc-card-media {
      position: relative;
      padding: 0.9rem 0.9rem 0;
    }
    .pc-gallery {
      height: auto;
      aspect-ratio: 16 / 9;
      border-radius: 1.2rem;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top, rgba(212,168,67,0.22), transparent 55%),
        #0d0d14;
    }
    [data-theme="light"] .pc-gallery {
      border-color: rgba(122, 90, 18, 0.14);
      background:
        radial-gradient(circle at top, rgba(212,168,67,0.18), transparent 55%),
        #f6efe0;
    }
    .pc-card-overlay {
      position: absolute;
      inset: 0.9rem 0.9rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 1.2rem;
      background: rgba(14, 10, 3, 0.18);
      backdrop-filter: blur(3px);
      opacity: 0;
      transition: opacity 0.28s ease;
      pointer-events: none;
    }
    [data-theme="light"] .pc-card-overlay {
      background: rgba(255,255,255,0.18);
    }
    .pc-card:hover .pc-card-overlay {
      opacity: 1;
    }
    .pc-card-overlay-btn {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.8rem 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(14, 10, 3, 0.78);
      color: #fff5db;
      font: inherit;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(0,0,0,0.24);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .pc-card-overlay-btn:hover {
      transform: translateY(-1px) scale(1.02);
      background: rgba(14, 10, 3, 0.88);
    }
    [data-theme="light"] .pc-card-overlay-btn {
      background: rgba(255,255,255,0.86);
      color: #463109;
      border-color: rgba(122, 90, 18, 0.16);
    }
    .pc-card-tags {
      position: absolute;
      left: 1.45rem;
      bottom: 0.95rem;
      z-index: 11;
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      max-width: calc(100% - 4rem);
    }
    .pc-card-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.34rem 0.72rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(12, 10, 16, 0.45);
      color: #fff8ea;
      font-family: var(--font-body);
      font-size: 0.7rem;
      line-height: 1;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .pc-card-tag:hover {
      transform: translateY(-1px);
      border-color: var(--border-gold);
      background: rgba(212,168,67,0.22);
    }
    [data-theme="light"] .pc-card-tag {
      background: rgba(255,255,255,0.7);
      color: #5d430f;
      border-color: rgba(122, 90, 18, 0.12);
    }
    .pc-card-topline {
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      align-items: flex-start;
    }
    .pc-card-summary {
      margin: 0.45rem 0 0;
      font-size: 0.93rem;
      line-height: 1.55;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pc-card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.55rem;
      padding-top: 0.1rem;
      font-size: 0.74rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .pc-card-category {
      font-weight: 700;
      color: var(--text-primary);
    }
    .pc-card-meta-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(212,168,67,0.7);
    }
    .pc-card-specs {
      list-style: none;
      margin: 0;
      display: grid;
      gap: 0.55rem;
    }
    .pc-card-specs li {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.84rem;
      color: var(--text-secondary);
    }
    .pc-card-specs li::before {
      content: '';
      width: 0.48rem;
      height: 0.48rem;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #fff3cf 0%, var(--gold-pure) 65%, #8b6508 100%);
      box-shadow: 0 0 14px rgba(212,168,67,0.35);
      flex-shrink: 0;
    }
    .pc-card-actions {
      display: flex;
      gap: 0.7rem;
      margin-top: 0.15rem;
    }
    .pc-card-actions .btn {
      flex: 1;
      justify-content: center;
    }
    .pc-modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.2rem 0 1rem;
    }
    @media (max-width: 1024px) { #builds-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px)  {
      #builds-grid { grid-template-columns: 1fr; }
      .builds-toolbar { grid-template-columns: 1fr; }
      .builds-sort-wrap { min-width: 0; }
      .pc-card-topline { flex-direction: column; }
      .pc-card-actions { flex-direction: column; }
    }
  </style>
</head>

<div id="nav-slot"></div>

<div class="page-wrapper">

  <!-- Hero -->
  <div class="builds-hero">
    <div class="container">
      <span class="section-eyebrow animate__animated animate__fadeInDown">Elysian Collection</span>

        Signature <span class="text-gold">Builds</span>
      </h1>
      <p class="section-subtitle animate__animated animate__fadeIn animate__delay-1s">
        Every machine is a handcrafted statement of intent. Choose yours.
      </p>
    </div>
  </div>

  <!-- Filter + Grid -->
  <div class="container">
    <div class="builds-toolbar reveal">
      <label class="builds-search" for="build-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>

      </label>
      <div class="builds-sort-wrap">
        <select id="build-sort" class="builds-sort" aria-label="Sort builds">

          <option value="name-asc">Name: A to Z</option>
        </select>
      </div>
    </div>

    <div class="filter-bar reveal">
      <button class="filter-chip active" data-filter="all">All Builds</button>
      <button class="filter-chip" data-filter="workstation">Workstation</button>
      <button class="filter-chip" data-filter="gaming">Gaming</button>
      <button class="filter-chip" data-filter="creator">Creator</button>
      <button class="filter-chip" data-filter="entry">Entry Luxury</button>
      <button class="filter-chip" data-filter="saved" id="chip-saved">Saved <span class="chip-dot" id="saved-dot" style="display:none"></span></button>
    </div>

    <div id="builds-grid"></div>

    <div class="text-center mt-4 reveal" id="builds-footer-cta">
      <p class="text-secondary mb-2">Don't see exactly what you need?</p>
      <a href="support.html" class="btn btn-outline btn-lg">Request a Custom Build</a>
    </div>
  </div>

  <!-- PC Detail Modal -->
  <div class="modal-overlay" id="pc-modal">
    <div class="modal" style="max-width:620px;max-height:90vh;overflow-y:auto;">
      <div class="modal-header">
        <span class="modal-title" id="modal-pc-name">PC Details</span>
        <button class="cart-close" onclick="document.getElementById('pc-modal').classList.remove('open')" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="modal-pc-content"></div>
    </div>
  </div>

</div>

<div id="footer-slot"></div>

<script src="partials.js"></script>

/* ================================================================
   GALLERY ENGINE — editing below this line is not necessary
   ================================================================ */

// Tracks current slide index per gallery instance
const galleryState = {};

function buildGalleryHTML(galleryId, images, height) {
  const hasMany = images.length > 1;

  const slides = images.length > 0
    ? images.map(src => `
        <div class="gallery-slide">
          <img src="${src}" alt="" loading="lazy"
               onerror="this.parentElement.innerHTML='<div class=gallery-placeholder>${svgPlaceholder()}</div>'">
        </div>`).join('')
    : `<div class="gallery-slide"><div class="gallery-placeholder">${svgPlaceholder()}</div></div>`;

  const arrows = hasMany ? `
    <button class="gallery-arrow prev" onclick="galleryPrev('${galleryId}',event)" aria-label="Previous">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="gallery-arrow next" onclick="galleryNext('${galleryId}',event)" aria-label="Next">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>` : '';

  const dots = hasMany
    ? `<div class="gallery-dots" id="dots-${galleryId}">
         ${images.map((_,i) =>
           `<button class="gallery-dot ${i===0?'active':''}" onclick="galleryGoTo('${galleryId}',${i},event)" aria-label="Image ${i+1}"></button>`
         ).join('')}
       </div>` : '';

  const counter = hasMany
    ? `<div class="gallery-counter" id="counter-${galleryId}">1 / ${images.length}</div>` : '';

  return `<div class="pc-gallery">
    <div class="gallery-track" id="track-${galleryId}">${slides}</div>
    ${arrows}${dots}${counter}
  </div>`;
}

function svgPlaceholder() {
  return `<svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="rgba(212,168,67,0.15)" stroke-width="0.8">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <line x1="8" y1="21" x2="16" y2="21"/>
    <line x1="12" y1="17" x2="12" y2="21"/>
  </svg>`;
}

function galleryGoTo(id, index, event) {
  if (event) event.stopPropagation();
  const s = galleryState[id];
  if (!s || index < 0 || index >= s.images.length) return;
  s.index = index;
  const track = document.getElementById(`track-${id}`);
  if (track) track.style.transform = `translateX(-${index * 100}%)`;
  document.getElementById(`dots-${id}`)?.querySelectorAll('.gallery-dot')
    .forEach((d, i) => d.classList.toggle('active', i === index));
  const counter = document.getElementById(`counter-${id}`);
  if (counter) counter.textContent = `${index + 1} / ${s.images.length}`;
}

function galleryNext(id, event) {
  if (event) event.stopPropagation();
  const s = galleryState[id];
  if (s) galleryGoTo(id, (s.index + 1) % s.images.length, null);
}

function galleryPrev(id, event) {
  if (event) event.stopPropagation();
  const s = galleryState[id];
  if (s) galleryGoTo(id, (s.index - 1 + s.images.length) % s.images.length, null);
}

/* ── Bookmark Engine ── */
const BOOKMARK_KEY = 'elysian-bookmarks';

function getBookmarks() {
  try { return JSON.parse(localStorage.getItem(BOOKMARK_KEY)) || []; }
  catch { return []; }
}

function isBookmarked(id) { return getBookmarks().includes(id); }

function toggleBookmark(id, event) {
  if (event) event.stopPropagation();
  const saved = getBookmarks();
  const idx = saved.indexOf(id);
  if (idx === -1) saved.push(id);
  else saved.splice(idx, 1);
  localStorage.setItem(BOOKMARK_KEY, JSON.stringify(saved));

  // Update all bookmark buttons for this id
  document.querySelectorAll(`.bookmark-btn[data-id="${id}"]`).forEach(btn => {
    const bookmarked = saved.includes(id);
    btn.classList.toggle('bookmarked', bookmarked);
    btn.setAttribute('aria-pressed', bookmarked);
    // Update tooltip text
    const tooltip = btn.nextElementSibling;
    if (tooltip) tooltip.textContent = bookmarked ? 'Remove bookmark' : 'Bookmark this';
  });

  updateSavedChip();

  // If currently viewing "saved" filter, re-render
  const activeChip = document.querySelector('.filter-chip.active');
  if (activeChip && activeChip.dataset.filter === 'saved') {
    renderBuilds(currentPCs, 'saved');
  }

  const pc = currentPCs.find(p => p.id === id);
  if (pc) {
    Toast[saved.includes(id) ? 'info' : 'info'](
      saved.includes(id) ? `"${pc.name}" saved to bookmarks.` : `"${pc.name}" removed from bookmarks.`
    );
  }
}

function updateSavedChip() {
  const count = getBookmarks().length;
  const dot = document.getElementById('saved-dot');
  if (dot) dot.style.display = count > 0 ? 'inline-block' : 'none';
}

function escapeHTML(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeJS(value) {
  return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function normalizeTags(tags) {
  const source = Array.isArray(tags) ? tags : String(tags || '').split(',');
  return source
    .map(tag => String(tag || '').trim().toLowerCase())
    .filter(Boolean)
    .filter((tag, idx, arr) => arr.indexOf(tag) === idx)
    .slice(0, 8);
}

function deriveTags(pc) {
  const tags = [];
  const price = parseInt(pc?.price, 10) || 0;
  const gpu = String(pc?.specs?.GPU || '').toLowerCase();
  const name = String(pc?.name || '').toLowerCase();
  const category = String(pc?.category || '').toLowerCase();

  if (category === 'gaming') tags.push('gaming');
  if (category === 'creator') tags.push('creator');
  if (category === 'workstation') tags.push('workstation');
  if (category === 'entry') tags.push('entry level');
  if (price && price < 2500) tags.push('budget');
  if (gpu.includes('4090') || price >= 5000) tags.push('4k');
  else if (gpu.includes('4080') || gpu.includes('4070')) tags.push('1440p');
  if (name.includes('mini') || name.includes('compact')) tags.push('compact');

  return normalizeTags(tags);
}

function normalizeBuild(pc, fallback = {}) {
  const merged = { ...fallback, ...pc };
  return {
    ...merged,
    specs: pc?.specs && typeof pc.specs === 'object' ? pc.specs : (fallback.specs || {}),
    images: Array.isArray(pc?.images) && pc.images.length ? pc.images : (fallback.images || []),
    tags: normalizeTags(pc?.tags || fallback.tags || deriveTags(merged))
  };
}

function formatTagLabel(tag) {
  return String(tag || '')
    .replace(/[-_]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .replace(/\b\w/g, ch => ch.toUpperCase());
}

function getBuildSummary(pc) {
  const specs = pc.specs || {};
  return [specs.CPU, specs.GPU, specs.RAM].filter(Boolean).slice(0, 3).join(' | ');
}

function applyBuildTagFilter(tag, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  activeQuery = String(tag || '').trim();
  const input = document.getElementById('build-search');
  if (input) input.value = activeQuery;
  renderBuilds(currentPCs, activeFilter);
}

function renderTagButtons(tags) {
  return normalizeTags(tags).slice(0, 4).map(tag =>
    `<button type="button" class="pc-card-tag" onclick="applyBuildTagFilter('${escapeJS(tag)}', event)">${escapeHTML(formatTagLabel(tag))}</button>`
  ).join('');
}

/* ── Card Builder ── */
function createPCCard(pc) {
  pc = normalizeBuild(pc);
  const images = Array.isArray(pc.images) ? pc.images.filter(Boolean) : [];
  galleryState[pc.id] = { index: 0, images };

  const card = document.createElement('div');
  card.className = 'card pc-card reveal';
  card.dataset.category = pc.category;
  card.dataset.tags = pc.tags.join(' ');
  card.style.position = 'relative';

  const specsPreview = Object.entries(pc.specs).slice(0, 4);
  const saved = isBookmarked(pc.id);
  const summary = getBuildSummary(pc);
  const tags = renderTagButtons(pc.tags);
  const categoryLabel = formatTagLabel(pc.category);

  card.innerHTML = `
    <div class="pc-card-media">
      ${buildGalleryHTML(pc.id, images, 240)}
      ${pc.badge ? `<div class="pc-card-badge">${escapeHTML(pc.badge)}</div>` : ''}
      ${tags ? `<div class="pc-card-tags">${tags}</div>` : ''}
      <div class="bookmark-wrap">
        <button
          class="bookmark-btn${saved ? ' bookmarked' : ''}"
          data-id="${pc.id}"
          aria-pressed="${saved}"
          aria-label="${saved ? 'Remove bookmark' : 'Bookmark this'}"
          onclick="toggleBookmark('${pc.id}', event)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="${saved ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <div class="tooltip-box">${saved ? 'Remove bookmark' : 'Bookmark this'}</div>
      </div>
      <div class="pc-card-overlay">
        <button type="button" class="pc-card-overlay-btn" onclick="openPCModal('${pc.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          View Build
        </button>
      </div>
    </div>
    <div class="card-body">
      <div class="pc-card-topline">
        <div>
          <div class="pc-card-title">${escapeHTML(pc.name)}</div>
          <p class="pc-card-summary">${escapeHTML(summary)}</p>
        </div>
        <div class="pc-card-price">$${pc.price.toLocaleString()}</div>
      </div>
      <div class="pc-card-meta">
        <span class="pc-card-category">${escapeHTML(categoryLabel)}</span>
        <span class="pc-card-meta-dot"></span>
        <span>${pc.tags.length ? escapeHTML(formatTagLabel(pc.tags[0])) : 'Custom Tuned'}</span>
      </div>
      <ul class="pc-card-specs">
        ${specsPreview.map(([k, v]) => `<li><strong>${escapeHTML(k)}:</strong> ${escapeHTML(v)}</li>`).join('')}
      </ul>
      <div class="pc-card-actions">
        <button class="btn btn-outline btn-sm" onclick="openPCModal('${pc.id}')">Details</button>
        <button class="btn btn-primary"
          onclick="Cart.add({id:'${pc.id}',name:'${escapeJS(pc.name)}',price:${pc.price}})">
          Add to Cart
        </button>
      </div>
    </div>`;

  return card;
}

/* ── Detail Modal ── */
function openPCModal(id) {
  const pc = currentPCs.find(p => p.id === id);
  if (!pc) return;
  const normalized = normalizeBuild(pc);

  const images = Array.isArray(normalized.images) ? normalized.images.filter(Boolean) : [];
  const mid = `modal-${normalized.id}`;
  galleryState[mid] = { index: 0, images };

  document.getElementById('modal-pc-name').textContent = normalized.name;
  document.getElementById('modal-pc-content').innerHTML = `
    <div class="modal-gallery-wrap">
      ${buildGalleryHTML(mid, images, 280)}
    </div>
    ${normalized.tags.length ? `<div class="pc-modal-tags">${renderTagButtons(normalized.tags)}</div>` : ''}
    <div style="margin-bottom:1rem;margin-top:0.25rem;">
      <span class="pc-card-price" style="font-size:1.8rem;">$${normalized.price.toLocaleString()}</span>
    </div>
    <table class="spec-table">
      ${Object.entries(normalized.specs).map(([k, v]) => `<tr><td>${escapeHTML(k)}</td><td>${escapeHTML(v)}</td></tr>`).join('')}
    </table>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
      <button class="btn btn-primary btn-full btn-lg"
        onclick="Cart.add({id:'${normalized.id}',name:'${escapeJS(normalized.name)}',price:${normalized.price}});document.getElementById('pc-modal').classList.remove('open')">
        Add to Cart
      </button>
    </div>`;

  document.getElementById('pc-modal').classList.add('open');
}

document.getElementById('pc-modal')?.addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

/* ── Render ── */
let currentPCs = [];
let activeFilter = 'all';
let activeQuery = '';
let activeSort = 'featured';

function getVisibleBuilds(pcs, filter) {
  let filtered;

  if (filter === 'saved') {
    const bookmarks = getBookmarks();
    filtered = pcs.filter(p => bookmarks.includes(p.id));
  } else {
    filtered = filter === 'all' ? pcs.slice() : pcs.filter(p => p.category === filter);
  }

  const query = activeQuery.trim().toLowerCase();
  if (query) {
    filtered = filtered.filter(pc => {
      const normalized = normalizeBuild(pc);
      const haystack = [
        normalized.name,
        normalized.category,
        normalized.badge,
        ...normalized.tags,
        ...Object.keys(normalized.specs || {}),
        ...Object.values(normalized.specs || {})
      ].join(' ').toLowerCase();
      return haystack.includes(query);
    });
  }

  if (activeSort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
  if (activeSort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
  if (activeSort === 'name-asc') filtered.sort((a, b) => a.name.localeCompare(b.name));

  return filtered;
}

function renderBuilds(pcs, filter = 'all') {
  const grid = document.getElementById('builds-grid');
  grid.innerHTML = '';
  activeFilter = filter;

  const filtered = getVisibleBuilds(pcs, filter);
  if (filtered.length === 0) {
    const emptyTitle = filter === 'saved' && !getBookmarks().length
      ? 'No saved builds yet.'
      : 'No builds match your current filters.';
    const emptyBody = filter === 'saved' && !getBookmarks().length
      ? 'Bookmark a system to keep a personal shortlist here.'
      : 'Try a different search phrase, another category, or clear your sort and search options.';

    grid.innerHTML = `
      <div class="builds-empty">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--gold-pure)" stroke-width="1.4" style="margin:0 auto 1rem;">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <div style="font-family:var(--font-display);font-size:1rem;letter-spacing:0.08em;">${emptyTitle}</div>
        <p>${emptyBody}</p>
      </div>`;
    return;
  }

  filtered.forEach(pc => grid.appendChild(createPCCard(pc)));
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }});
  }, { threshold: 0.1 });
  grid.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

function renderSkeletons() {
  document.getElementById('builds-grid').innerHTML = Array(6).fill(0).map(() => `
    <div class="card" style="overflow:hidden;">
      <div class="skeleton skel-img"></div>
      <div class="card-body">
        <div class="skeleton skel-text lg"></div>
        <div class="skeleton skel-text sm" style="height:1.5rem;margin:0.5rem 0 1rem;"></div>
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-text sm"></div>
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-text sm"></div>
        <div class="skeleton skel-btn"></div>
      </div>
    </div>`).join('');
}

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderBuilds(currentPCs, chip.dataset.filter);
  });
});

document.getElementById('build-search')?.addEventListener('input', (event) => {
  activeQuery = event.target.value || '';
  renderBuilds(currentPCs, activeFilter);
});

document.getElementById('build-sort')?.addEventListener('change', (event) => {
  activeSort = event.target.value || 'featured';
  renderBuilds(currentPCs, activeFilter);
});

async function loadBuilds() {
  renderSkeletons();
  const data = await fetchPCData();
  if (data && data.pcs && data.pcs.length) {
    // KV data overrides editable fields; local file still supplies image fallbacks.
    currentPCs = data.pcs.map(kvPC => {
      const local = DEFAULT_PCS.find(d => d.id === kvPC.id);
      return normalizeBuild(kvPC, local);
    });
  } else {
    currentPCs = DEFAULT_PCS.map(pc => normalizeBuild(pc));
  }
  renderBuilds(currentPCs);
}

document.addEventListener('DOMContentLoaded', () => { loadBuilds(); updateSavedChip(); });
</script>

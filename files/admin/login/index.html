<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Elysian PCs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div id="aurora-bg" aria-hidden="true"><div id="aurora-layer"></div></div>
  <main class="page-wrapper" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <section class="card" style="width:min(100%,440px);padding:2.5rem;border:1px solid var(--border-gold);box-shadow:var(--shadow-deep),var(--shadow-gold);">
      <img src="../../assets/logo.jpg" alt="Elysian PCs" style="width:72px;height:72px;border-radius:16px;border:1px solid var(--border-gold);display:block;margin:0 auto 1.5rem;object-fit:contain;">
      <div class="text-center">
        <div class="section-eyebrow" style="margin-bottom:0.5rem;">Protected Admin Surface</div>
        <h1 class="section-title" style="font-size:1.8rem;margin-bottom:0.5rem;">Admin Sign In</h1>
        <p class="text-secondary" style="margin-bottom:2rem;">Server-side authenticated access for the Elysian dashboard.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="admin-password">Admin Password</label>
        <input id="admin-password" class="form-control" type="password" placeholder="Enter your password">
      </div>

      <button id="admin-login-button" class="btn btn-primary btn-full btn-lg">Sign In</button>
      <p id="admin-login-error" class="text-center" style="display:none;color:var(--accent-red);margin-top:0.9rem;font-size:0.85rem;"></p>

      <div class="gold-divider" style="margin:1.8rem 0;"></div>
      <p class="text-secondary text-center" style="font-size:0.82rem;">Need to get back to the public site? <a href="../../index.html">Return home</a>.</p>
    </section>
  </main>

  <script>
    async function submitAdminLogin() {
      const input = document.getElementById('admin-password');
      const button = document.getElementById('admin-login-button');
      const error = document.getElementById('admin-login-error');
      const password = input.value.trim();

      if (!password) {
        error.textContent = 'Enter your admin password.';
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';
      button.disabled = true;
      button.textContent = 'Signing In...';

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ password })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Unable to sign in.');
        }
        window.location.href = '/admin/';
      } catch (err) {
        error.textContent = err.message || 'Unable to sign in.';
        error.style.display = 'block';
      } finally {
        button.disabled = false;
        button.textContent = 'Sign In';
      }
    }

    document.getElementById('admin-login-button').addEventListener('click', submitAdminLogin);
    document.getElementById('admin-password').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') submitAdminLogin();
    });
  </script>
</body>
</html>
